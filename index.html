<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suner</title>
    <link rel="stylesheet" href="./src/css/estilo.css">
</head>

<body>
    <main class="site"><!-- tudo vai estar dentro deste mano -->

        <section class="sub-main">

            <header>
                <div class="barra-pesquisa">
                    <img src="./src/assets/image/lupa-pesquisa.png" class="lupa-pesquisa">
                    <input type="text" placeholder="Pesquisar" class="input-pesquisa"></input>
                </div>
                
                <img src="./src/assets/image/foto_teste_tocandoAgora.jpg" class="foto-perfil">
            </header>

            <h1 id="bem-vindoText">Bem-vindo, Usuário!</h1>

            <div id="banner-bemvindo"></div>

            <h1 id="volte-escutarText">Volte a escutar</h1>

            <article id="volte-escutar">

                <div class="icon">

                    <img src="./src/assets/image/playlist/capa_playlist.jpg" class="capa-album">
                    <h2 class="icon-nome">Franco da Rocha</h2>
                    <h3 class="icon-artista">Presidente Kiko</h3>
                    <h4 class="tipo">Álbum</h4>

                </div>

                <div class="icon">

                    <img src="./src/assets/image/foto_teste_tocandoAgora.jpg" class="capa-artista">
                    <h2 class="icon-nome">Presidente Kiko</h2>
                    <h3 class="icon-artista"></h3>
                    <h4 class="tipo">Artista</h4>

                </div>

                <div class="icon">

                    <img src="./src/assets/image/foto_teste_tocandoAgora.jpg" class="capa-musica">
                    <h2 class="icon-nome">Franco da Rocha</h2>
                    <h3 class="icon-artista">Presidente Kiko</h3>
                    <h4 class="tipo">Música</h4>

                </div>

            </article>

            <h1 id="fora-radarText">Fora do radar</h1>

            <article id="fora-radar">

                <!-- aqui vai os icon, que são controlados pelo js -->

            </article>

        </section>

        <aside class="barra-lateral">

            <img src="/src/assets/image/logo-temporario.png" class="logo">

            <div class="playlist-content">

                <div class="playlist-container">
                    <img class="botao-add-playlist" src="./src/assets/image/add_playlist.png">
                    <h1 class="playlist-nome">Criar nova playlist</h1>
                </div>

                <div class="playlist-container">
                    <img class="playlist" src="./src/assets/image/playlist/capa_playlist.jpg">
                    <h1 class="playlist-nome">Nome da playlist</h1>
                </div>
                <div class="playlist-container">
                    <img class="playlist" src="./src/assets/image/playlist/capa_playlist.jpg">
                    <h1 class="playlist-nome">Nome da playlist</h1>
                </div>
                <div class="playlist-container">
                    <img class="playlist" src="./src/assets/image/playlist/capa_playlist.jpg">
                    <h1 class="playlist-nome">Nome da playlist</h1>
                </div>


            </div>

        </aside>

        <!-- controle de música -->
        <div class="controle-musica">

            <img class="imagem-musica" src="src/assets/image/musicas/teste_musica.png">
            <h1 class="titulo" id="titulo-player-musica">Blind Spots</h1>

            <div class="botoes-player">
                <img class="botao-player-voltaravancar" src="/src/assets/image/botoes/voltar_avancar.png">
                <img class="botao-player-tocar" src="/src/assets/image/botoes/botao_pausar.png">
                <img class="botao-player-voltaravancar" id="botao-player-avancar" src="/src/assets/image/botoes/voltar_avancar.png">
            </div>

            <div class="barra-progresso">
                <div class="progresso-musica">
                    <div class="bolinha-progresso"></div>
                </div>
            </div>  
        </div>

    </main>

    <script src="./src/js/scriptCriarIcon.js"></script>
    <script src="./src/js/script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.js" integrity="sha512-fCU+rmH3nS/RJaTSl/ylo/PxwWIZwJts3rfxRylSPqGYMJGPLXvPJGOTF+ECb0K5m9rSXbkCNg2PR7WKGWRTVQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</body>

</html>
