<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suner</title>
    <link rel="stylesheet" href="./src/css/estilo.css">
    <link rel="icon" type="image/png" href="./src/assets/image/logosite.png">
</head>

<body>
    <main class="site"><!-- tudo vai estar dentro deste mano -->

        <section class="sub-main">

            <header>
                <div class="barra-pesquisa">
                    <img src="./src/assets/image/lupa-pesquisa.png" class="lupa-pesquisa">
                    <input type="text" placeholder="Pesquisar" class="input-pesquisa"></input>
                </div>

                <img src="./src/assets/image/foto_teste_tocandoAgora.jpg" class="foto-perfil">
                <img src="./src/assets/image/logosite.png" class="logo-mobile">
            </header>

            <h1 id="bem-vindoText">Bem-vindo, Usuário</h1>

            <img id="banner-bemvindo" src="./src/assets/image/banner/banner2.png">

            <h1 id="volte-escutarText">Volte a escutar</h1>

            <article id="volte-escutar">

            </article>

            <h1 id="fora-radarText">Fora do radar</h1>
            <h2 id="descricao-fora-radar">Descubra novas músicas e artistas pequenos</h2>

            <article id="fora-radar">

                <!-- aqui vai os icon, que são controlados pelo js -->

            </article>

            <section class="barra-debaixo">
                <div class="container-barra-debaixo">
                    <img class="img-barra-debaixo" src="./src/assets/image/botoes/homepreenchido.png">
                    <h1>Início</h1>
                </div>

                <div class="container-barra-debaixo">
                    <img class="imagem-nao-selecionada" src="./src/assets/image/botoes/playlistspreenchido.png">
                    <h1 class="nao-selecionado">Playlists</h1>
                </div>

                <div class="container-barra-debaixo">
                    <img class="imagem-nao-selecionada" src="./src/assets/image/botoes/usuariopreenchido.png">
                    <h1 class="nao-selecionado">Conta</h1>
                </div>
            </section>

        </section>

        <aside class="barra-lateral">

            <a href="/src/pages/sobrenos.html"><img src="./src/assets/image/logosite.png" class="logo"></a>

            <div class="playlist-container" id="btn-criarPlaylist">
                <img class="botao-add-playlist" src="./src/assets/image/add_playlist.png">
                <h1 class="playlist-nome">Criar nova playlist</h1>
            </div>

            <div id="input-playlists" class="hide">
                <div>
                    <label for="input-nomePlaylist">Nome da playlist:</label>
                    <input type="text" id="input-nomePlaylist" placeholder="Nome playlist">
                </div>
                <div>
                    <label for="input-nomeCriador">Nome do criador:</label>
                    <input type="text" id="input-nomeCriador" placeholder="Nome do criador">
                </div>
                <button type="button" id="btn-confirmarPlaylist">Confirmar</button>
            </div>

            <div class="playlist-content">



                <div class="playlist-container">
                    <img class="playlist" src="./src/assets/image/playlist/capa_playlist.jpg">
                    <h1 class="playlist-nome">Nome da playlist</h1>
                </div>
                <div class="playlist-container">
                    <img class="playlist" src="./src/assets/image/playlist/capa_playlist.jpg">
                    <h1 class="playlist-nome">Nome da playlist</h1>
                </div>
                <div class="playlist-container">
                    <img class="playlist" src="./src/assets/image/playlist/capa_playlist.jpg">
                    <h1 class="playlist-nome">Nome da playlist</h1>
                </div>


            </div>

        </aside>

        <!-- controle de música -->
        <div class="controle-musica">
            <img class="imagem-musica" src="">
            <div class="container-texto-musica">
                <h1 class="titulo" id="titulo-player-musica"></h1>
                <h2 id="titulo-player-album"></h2>
                <h2 id="titulo-player-artista"></h2>
            </div>

            <div class="botoes-player">
                <img class="botao-player-voltaravancar" src="./src/assets/image/botoes/voltar_avancar.png">
                <img id="botao-player-tocar" src="./src/assets/image/botoes/botao_tocar.png">
                <img class="botao-player-voltaravancar" id="botao-player-avancar"
                    src="./src/assets/image/botoes/voltar_avancar.png">
            </div>

            <div class="container-progresso">
                <div class="barra-progresso">
                    <div class="progresso-musica"></div>
                    <div class="bolinha-progresso"></div>
                </div>

                <h4 class="tempo" id="tempo-atual">0:00</h4>
                <h4 class="tempo" id="tempo-total">0:00</h4>

            </div>

            <div class="controle-volume">
                <button id="btn-mutar" class="btn-mutar"><img class="imagem-botao-mutar"
                        src="./src/assets/image/botoes/volume.png" alt="Mutar"></button>
                <input type="range" id="volume-bar" min="0" max="100" value="50">
            </div>
        </div>

    </main>

    <script src="./src/js/script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.js"
        integrity="sha512-fCU+rmH3nS/RJaTSl/ylo/PxwWIZwJts3rfxRylSPqGYMJGPLXvPJGOTF+ECb0K5m9rSXbkCNg2PR7WKGWRTVQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</body>

</html>
